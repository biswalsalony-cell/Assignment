<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        nav{
            width: 100%;
            height: 75px;
            background: rgb(161, 4, 56);
            align-items: center;
            justify-content: center;
            text-align: center;
            position: fixed;
        }
        nav b{
            font-size:50px;
            color: white;
        }
        .main{
            display: flex;
            flex-direction:column;
            align-items: center;
            overflow: auto;
            height:500px;
            justify-content: space-around;
        }
        .container{
            width:100%;
            height:300px;
            display: flex;
            margin-top: 80px;
            justify-content: space-around;
            gap:30px;
            flex-direction:row;
        }
        .block{
            background:rgb(241, 135, 160);
            height:250px;
            width: 250px;
            align-items: center;
            justify-content: space-around;
            flex-direction: column;
            gap: 5px;
        }
        .footer{
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            height:80px;
            width:100%;
            font-size: 50px;
            background:rgb(161, 4, 56) ;
            color:white;
        }

    </style>
</head>
<body>
    <nav>
        <b>Home</b>
    </nav>
    <div class="main">
    <div class="container">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>
     <div class="container">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>
     <div class="container">
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
        <div class="block"></div>
    </div>
   </div>
    <div class="footer">
        <p>FOOTER</p>
    </div>    
</body>
</html>
