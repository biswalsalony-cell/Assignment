<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Design</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#07122c;
            color:white;
        }

        .container{
            width:100%;
            min-height:100vh;

            display:flex;
            justify-content:space-around;
            align-items:center;

            padding:50px;
            gap:50px;
        }

        /* LEFT */

        .left{
            width:45%;
        }

        .left h1{
            font-size:70px;
            line-height:85px;
            margin-bottom:25px;
        }

        .left p{
            font-size:20px;
            color:#cfcfcf;
            line-height:30px;
            margin-bottom:30px;
        }

        .buttons{
            display:flex;
            gap:20px;
        }

        button{
            padding:15px 35px;
            border-radius:12px;
            font-size:18px;
            cursor:pointer;
        }

        .btn1{
            background:#2f6df6;
            border:none;
            color:white;
        }

        .btn2{
            background:transparent;
            border:2px solid white;
            color:white;
        }

        /* RIGHT */

        .right{
            width:45%;

            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .box{
            width:220px;
            height:220px;

            background:#1a2642;

            border-radius:25px;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:35px;
            font-weight:bold;

            cursor:pointer;

            transition:0.4s;
        }

        /* HOVER EFFECT */

        .box:hover{
            background:#2f6df6;
            transform:scale(1.05);
        }

        /* MEDIA QUERY */

        @media(max-width:900px){

            .container{
                flex-direction:column;
                text-align:center;
            }

            .left{
                width:100%;
            }

            .right{
                width:100%;
            }

            .buttons{
                justify-content:center;
            }

            .left h1{
                font-size:50px;
                line-height:65px;
            }

        }

        @media(max-width:500px){

            .box{
                width:150px;
                height:150px;
                font-size:25px;
            }

            .left h1{
                font-size:38px;
                line-height:50px;
            }

            .left p{
                font-size:16px;
            }

        }

    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left">

            <h1>
                Learn <br>
                Responsive <br>
                Web Design
            </h1>

            <p>
                This section automatically changes layout on mobile,
                tablet and desktop using Flexbox, Flex Wrap and
                Media Queries.
            </p>

            <div class="buttons">

                <button class="btn1">Explore</button>

                <button class="btn2">Learn More</button>

            </div>

        </div>


        <!-- RIGHT SIDE -->

        <div class="right">

            <div class="box">HTML</div>

            <div class="box">CSS</div>

            <div class="box">Flexbox</div>

            <div class="box">Media Query</div>

        </div>

    </div>

</body>
</html>
