<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#cfd8f6;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:600px;
            background:#dde3f7;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0px 5px 15px gray;
        }

        .title{
            font-size:40px;
            font-weight:bold;
            margin-bottom:25px;
        }

        .text{
            font-size:22px;
            color:#555;
            line-height:35px;
            margin-bottom:30px;
        }

        .stars{
            font-size:50px;
            margin-bottom:30px;
        }

        textarea{
            width:100%;
            height:180px;
            border:none;
            border-radius:15px;
            padding:20px;
            font-size:20px;
            resize:none;
            margin-bottom:30px;
        }

        button{
            background:#f4cd57;
            border:none;
            padding:15px 50px;
            border-radius:30px;
            font-size:24px;
            cursor:pointer;
        }

    </style>
</head>

<body>

    <div class="box">

        <div class="title">
            Rate your experience
        </div>

        <div class="text">
            We highly value your feedback!
            Kindly take a moment to rate your experience
            and provide us with your valuable feedback.
        </div>

        <div class="stars">
            ⭐ ⭐ ⭐ ⭐ ☆
        </div>

        <textarea placeholder="Tell us about your experience!"></textarea>

        <br>

        <button>Send</button>

    </div>

</body>
</html>
